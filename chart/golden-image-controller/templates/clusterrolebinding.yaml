apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "golden-image-controller.fullname" . }}
  labels:
    {{- include "golden-image-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "golden-image-controller.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "golden-image-controller.serviceAccountName" . }}
    namespace: {{ include "golden-image-controller.namespace" . }}
