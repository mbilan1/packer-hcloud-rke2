---
# Tasks for cis-hardening wrapper role
#
# Runs the upstream CIS benchmark, then applies post-CIS safety fixes
# for Hetzner Cloud + Kubernetes compatibility.
#
# CRITICAL DESIGN: Every task in this file MUST be:
#   1. IDEMPOTENT — running twice produces the same result
#   2. REBOOT-SAFE — state survives reboot exactly as intended
#   3. K8S-COMPATIBLE — does not break RKE2/Canal/kubelet networking

# ── Phase 1: Pre-CIS preparation ────────────────────────────────────────────

# WORKAROUND: sshd privilege separation directory may not exist on fresh images.
# CIS rule 5.1.5 runs `sshd -t` to validate config, which fails without /run/sshd.
# NOTE: This is build-time only. At runtime, systemd-tmpfiles.d recreates /run/sshd.
- name: Ensure sshd privilege separation directory exists
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    mode: "0755"
    owner: root
    group: root

# DECISION: Stop nftables BEFORE upstream CIS role runs, not after.
# Why: Ubuntu 24.04 UFW uses iptables backend. If nftables is active during
#      CIS Section 4 (UFW setup), there's a race condition between nftables
#      and iptables backends that can cause rules not to persist after reboot.
- name: Stop nftables before CIS hardening (prevents UFW race condition)
  ansible.builtin.systemd:
    name: nftables
    state: stopped
    enabled: false
  failed_when: false

# ── Phase 2: Run upstream CIS hardening ──────────────────────────────────────

- name: Apply CIS Level 1 hardening (UBUNTU24-CIS)
  ansible.builtin.include_role:
    name: ansible-lockdown.UBUNTU24-CIS

# ── Phase 3: Post-CIS network safety ────────────────────────────────────────

- name: Remove ipv6.disable=1 from GRUB (breaks Hetzner Cloud networking)
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '\s*ipv6\.disable=1'
    replace: ''
  register: grub_ipv6_fix

- name: Update GRUB after removing ipv6.disable
  ansible.builtin.command: update-grub
  when: grub_ipv6_fix.changed
  changed_when: grub_ipv6_fix.changed

- name: Ensure net.ipv4.ip_forward=1 for Kubernetes networking
  ansible.builtin.copy:
    content: |
      # Override CIS rule 3.3.1 — Kubernetes needs packet forwarding
      net.ipv4.ip_forward = 1
    dest: /etc/sysctl.d/99-kubernetes-forwarding.conf
    owner: root
    group: root
    mode: "0644"
  register: ip_forward_conf

# DECISION: Apply sysctl after writing config file, not just at next reboot.
# Why: CIS upstream role disables ip_forward at runtime (rule 3.3.1).
#      Our 99-kubernetes-forwarding.conf overrides it for reboot, but the
#      runtime value stays 0 until we explicitly reload sysctl.
#      Use explicit sysctl -w rather than sysctl --system because the CIS role
#      may have created competing configs that get re-applied during --system.
- name: Apply ip_forward sysctl override (runtime)
  ansible.builtin.command: sysctl -w net.ipv4.ip_forward=1
  changed_when: ip_forward_conf.changed

# ── Phase 4: AppArmor — relax container-runtime profiles ────────────────────
#
# DECISION: Only set complain mode for profiles that actually exist on the system.
# Why: Blindly running aa-complain on non-existent profiles is not idempotent
#      and masks real failures with ignore_errors.

- name: Check which AppArmor profiles exist
  ansible.builtin.command: aa-status --json
  register: aa_status
  changed_when: false
  failed_when: false

- name: Set existing container-runtime AppArmor profiles to complain mode
  ansible.builtin.command: "aa-complain {{ item }}"
  loop:
    - runc
    - crun
  when: "item in (aa_status.stdout | default(''))"
  register: aa_complain_result
  changed_when: "'Setting' in (aa_complain_result.stdout | default(''))"

# DECISION: Persist AppArmor complain mode across reboots via tunables.
# Why: aa-complain is runtime-only — after reboot, profiles revert to enforce.
#      Writing to /etc/apparmor.d/local/ ensures complain mode survives reboots.
- name: Persist AppArmor complain mode for container runtimes
  ansible.builtin.copy:
    content: |
      # Managed by cis-hardening role — do not edit
      # Allow container runtimes to operate without AppArmor enforcement.
      # Required for RKE2/containerd/runc to function correctly.
      flags=(complain)
    dest: "/etc/apparmor.d/local/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - runc
    - crun
  when: "item in (aa_status.stdout | default(''))"

# ── Phase 5: Post-CIS UFW — Kubernetes/RKE2 port rules ──────────────────────
#
# DECISION: CIS Section 4 enables UFW with default deny incoming + deny routed.
# Post-CIS tasks add RKE2/K8s allow rules and override the routing policy.
# Why: CIS 4.2.4 sets "ufw default deny routed" which breaks Kubernetes CNI
#      (pod-to-pod traffic via VXLAN traverses the FORWARD chain).
#      Override to "allow routed" is a documented CIS deviation required for
#      any Kubernetes node. All other Section 4 rules remain intact.

# -- Public-facing services (allow from any) --

- name: "UFW: Allow SSH (port 22) for provisioning"
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: "SSH — machine driver provisioning"

- name: "UFW: Allow Kubernetes API (port 6443)"
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp
    comment: "Kubernetes API server"

- name: "UFW: Allow RKE2 supervisor (port 9345)"
  community.general.ufw:
    rule: allow
    port: "9345"
    proto: tcp
    comment: "RKE2 join/supervisor API"

- name: "UFW: Allow HTTPS ingress (port 443)"
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
    comment: "HTTPS ingress"

- name: "UFW: Allow HTTP ingress (port 80)"
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
    comment: "HTTP ingress"

# -- Private network only (inter-node RKE2 traffic) --

- name: "UFW: Allow etcd (ports 2379-2380) from private network"
  community.general.ufw:
    rule: allow
    port: "2379:2380"
    proto: tcp
    from_ip: "10.0.0.0/8"
    comment: "etcd — private network only"

- name: "UFW: Allow kubelet (port 10250) from private network"
  community.general.ufw:
    rule: allow
    port: "10250"
    proto: tcp
    from_ip: "10.0.0.0/8"
    comment: "kubelet metrics — private network only"

- name: "UFW: Allow VXLAN/Canal CNI (port 8472/udp) from private network"
  community.general.ufw:
    rule: allow
    port: "8472"
    proto: udp
    from_ip: "10.0.0.0/8"
    comment: "VXLAN CNI overlay — private network only"

- name: "UFW: Allow kube-proxy health (port 10256) from private network"
  community.general.ufw:
    rule: allow
    port: "10256"
    proto: tcp
    from_ip: "10.0.0.0/8"
    comment: "kube-proxy health check — private network only"

# -- Pod/Service CIDRs (allow all traffic from K8s internal CIDRs) --

- name: "UFW: Allow all traffic from Pod CIDR (10.42.0.0/16)"
  community.general.ufw:
    rule: allow
    from_ip: "10.42.0.0/16"
    comment: "Kubernetes Pod CIDR"

- name: "UFW: Allow all traffic from Service CIDR (10.43.0.0/16)"
  community.general.ufw:
    rule: allow
    from_ip: "10.43.0.0/16"
    comment: "Kubernetes Service CIDR"

# -- Override routing policy for CNI (CIS deviation) --

- name: "UFW: Set default allow routed (CIS 4.2.4 deviation for K8s CNI)"
  community.general.ufw:
    direction: routed
    default: allow

# -- CRITICAL: Set default allow outgoing (CIS deviation for K8s) --
#
# DECISION: Override DEFAULT_OUTPUT_POLICY in /etc/default/ufw from DROP to ACCEPT.
# Why: CIS rule 3.5.1.3 sets "ufw default deny outgoing" which writes
#      DEFAULT_OUTPUT_POLICY="DROP" to /etc/default/ufw. The community.general.ufw
#      module sets "ufw default allow outgoing" at runtime, but /etc/default/ufw
#      is the AUTHORITATIVE source after reboot. After reboot, DROP wins and blocks:
#      - kube-proxy DNAT'd traffic to apiserver:6443 (kills Canal CNI install)
#      - kubelet → apiserver communication
#      - etcd peer traffic
#      - All K8s internal networking
# This caused a production incident: Canal install-cni CrashLoopBackOff because
# 10.43.0.1:443 → DNAT → apiserver:6443 → DROPPED by UFW output policy.

- name: "UFW: Set default allow outgoing (CIS deviation — K8s needs unrestricted egress)"
  community.general.ufw:
    direction: outgoing
    default: allow

- name: "UFW: Ensure /etc/default/ufw has OUTPUT ACCEPT (survives reboot)"
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_OUTPUT_POLICY='
    line: 'DEFAULT_OUTPUT_POLICY="ACCEPT"'
    state: present

- name: "UFW: Ensure /etc/default/ufw has FORWARD ACCEPT (survives reboot)"
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_FORWARD_POLICY='
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
    state: present

# ── Phase 5b: Re-apply K8s sysctl overrides after all CIS/UFW tasks ─────────
#
# DECISION: Re-apply ip_forward after all hardening is done.
# Why: The CIS upstream role (Phase 2) writes sysctl configs that disable
#      ip_forward at runtime. Phase 3 re-enables it, but subsequent UFW
#      operations (Phase 5) may trigger sysctl reloads that re-apply the
#      CIS-written configs, setting ip_forward back to 0.
#      This final sysctl reload ensures our 99-kubernetes-forwarding.conf
#      override wins, regardless of task ordering side effects.

- name: "Remove CIS-written sysctl configs that conflict with Kubernetes"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/sysctl.d/60-netipv4_sysctl.conf
    - /etc/sysctl.d/60-netipv6_sysctl.conf
  register: cis_sysctl_cleanup

# DECISION: Remove ip_forward=0 from /etc/sysctl.conf as well.
# Why: sysctl --system loads /etc/sysctl.conf LAST, after /etc/sysctl.d/*.conf.
#      If the CIS role wrote net.ipv4.ip_forward=0 there, it overrides our
#      99-kubernetes-forwarding.conf. Removing the line ensures our override wins.
- name: "Remove ip_forward=0 from /etc/sysctl.conf (loaded last by sysctl --system)"
  ansible.builtin.lineinfile:
    path: /etc/sysctl.conf
    regexp: '^net\.ipv4\.ip_forward\s*='
    state: absent

- name: "Re-apply sysctl overrides (ensure ip_forward=1 after all tasks)"
  ansible.builtin.command: sysctl --system
  changed_when: cis_sysctl_cleanup.changed

# DECISION: Explicit runtime override as final guarantee.
# Why: Belt-and-suspenders. Even if unknown config files re-disable ip_forward
#      during sysctl --system, this explicit write ensures the runtime value is 1.
- name: "Force ip_forward=1 at runtime (final override)"
  ansible.builtin.command: sysctl -w net.ipv4.ip_forward=1
  changed_when: false

# ── Phase 6: Verify post-CIS state (idempotency gate) ───────────────────────
#
# DECISION: Assert critical system state after all hardening tasks.
# Why: Upstream CIS role is a black box (447 tasks). We must verify its output
#      didn't break K8s-required settings. If any assertion fails, the build fails
#      immediately — no broken images enter the snapshot pipeline.

- name: "Verify: UFW DEFAULT_OUTPUT_POLICY is ACCEPT"
  ansible.builtin.command: grep -q 'DEFAULT_OUTPUT_POLICY="ACCEPT"' /etc/default/ufw
  changed_when: false

- name: "Verify: UFW DEFAULT_FORWARD_POLICY is ACCEPT"
  ansible.builtin.command: grep -q 'DEFAULT_FORWARD_POLICY="ACCEPT"' /etc/default/ufw
  changed_when: false

- name: "Verify: net.ipv4.ip_forward is enabled"
  ansible.builtin.command: sysctl -n net.ipv4.ip_forward
  register: ip_forward_check
  changed_when: false
  failed_when: ip_forward_check.stdout | trim != "1"

- name: "Verify: UFW is active"
  ansible.builtin.command: ufw status
  register: ufw_status
  changed_when: false
  failed_when: "'Status: active' not in ufw_status.stdout"

# ── Phase 7: Write hardening metadata ───────────────────────────────────────

- name: Record CIS hardening metadata
  ansible.builtin.copy:
    content: |
      # CIS hardening applied at Packer build time
      benchmark: UBUNTU24-CIS
      benchmark_version: v1.0.0
      role_version: 1.0.4
      level: 1
      applied_at: {{ ansible_date_time.iso8601 }}
    dest: /etc/cis-hardening-applied
    mode: "0444"
