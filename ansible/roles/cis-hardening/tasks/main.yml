---
# Tasks for cis-hardening wrapper role
#
# Runs the upstream CIS benchmark, then applies post-CIS safety fixes
# for Hetzner Cloud + Kubernetes compatibility.

# ── Phase 1: Run upstream CIS hardening ──────────────────────────────────────

# WORKAROUND: sshd privilege separation directory may not exist on fresh images.
# CIS rule 5.1.5 runs `sshd -t` to validate config, which fails without /run/sshd.
- name: Ensure sshd privilege separation directory exists
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Apply CIS Level 1 hardening (UBUNTU24-CIS)
  ansible.builtin.include_role:
    name: ansible-lockdown.UBUNTU24-CIS

# ── Phase 2: Post-CIS network safety ────────────────────────────────────────

- name: Remove ipv6.disable=1 from GRUB (breaks Hetzner Cloud networking)
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '\s*ipv6\.disable=1'
    replace: ''
  register: grub_ipv6_fix

- name: Update GRUB after removing ipv6.disable
  ansible.builtin.command: update-grub
  when: grub_ipv6_fix.changed
  changed_when: true

- name: Ensure net.ipv4.ip_forward=1 for Kubernetes networking
  ansible.builtin.copy:
    content: |
      # Override CIS rule 3.3.1 — Kubernetes needs packet forwarding
      net.ipv4.ip_forward = 1
    dest: /etc/sysctl.d/99-kubernetes-forwarding.conf
    owner: root
    group: root
    mode: "0644"

# ── Phase 3: AppArmor — relax container-runtime profiles ────────────────────

- name: Set container-runtime AppArmor profiles to complain mode
  ansible.builtin.command: "aa-complain {{ item }}"
  loop:
    - busybox
    - crun
    - buildah
    - ch-checkns
    - ch-run
    - runc
  ignore_errors: true
  changed_when: true

# ── Phase 4: Post-CIS UFW — Kubernetes/RKE2 port rules ──────────────────────
#
# DECISION: CIS Section 4 enables UFW with default deny incoming + deny routed.
# Post-CIS tasks add RKE2/K8s allow rules and override the routing policy.
# Why: CIS 4.2.4 sets "ufw default deny routed" which breaks Kubernetes CNI
#      (pod-to-pod traffic via VXLAN traverses the FORWARD chain).
#      Override to "allow routed" is a documented CIS deviation required for
#      any Kubernetes node. All other Section 4 rules remain intact.

# -- Public-facing services (allow from any) --

- name: "UFW: Allow SSH (port 22) for provisioning"
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: "SSH — machine driver provisioning"

- name: "UFW: Allow Kubernetes API (port 6443)"
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp
    comment: "Kubernetes API server"

- name: "UFW: Allow RKE2 supervisor (port 9345)"
  community.general.ufw:
    rule: allow
    port: "9345"
    proto: tcp
    comment: "RKE2 join/supervisor API"

- name: "UFW: Allow HTTPS ingress (port 443)"
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
    comment: "HTTPS ingress"

- name: "UFW: Allow HTTP ingress (port 80)"
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
    comment: "HTTP ingress"

# -- Private network only (inter-node RKE2 traffic) --

- name: "UFW: Allow etcd (ports 2379-2380) from private network"
  community.general.ufw:
    rule: allow
    port: "2379:2380"
    proto: tcp
    from_ip: "10.0.0.0/8"
    comment: "etcd — private network only"

- name: "UFW: Allow kubelet (port 10250) from private network"
  community.general.ufw:
    rule: allow
    port: "10250"
    proto: tcp
    from_ip: "10.0.0.0/8"
    comment: "kubelet metrics — private network only"

- name: "UFW: Allow VXLAN/Canal CNI (port 8472/udp) from private network"
  community.general.ufw:
    rule: allow
    port: "8472"
    proto: udp
    from_ip: "10.0.0.0/8"
    comment: "VXLAN CNI overlay — private network only"

- name: "UFW: Allow kube-proxy health (port 10256) from private network"
  community.general.ufw:
    rule: allow
    port: "10256"
    proto: tcp
    from_ip: "10.0.0.0/8"
    comment: "kube-proxy health check — private network only"

# -- Pod/Service CIDRs (allow all traffic from K8s internal CIDRs) --

- name: "UFW: Allow all traffic from Pod CIDR (10.42.0.0/16)"
  community.general.ufw:
    rule: allow
    from_ip: "10.42.0.0/16"
    comment: "Kubernetes Pod CIDR"

- name: "UFW: Allow all traffic from Service CIDR (10.43.0.0/16)"
  community.general.ufw:
    rule: allow
    from_ip: "10.43.0.0/16"
    comment: "Kubernetes Service CIDR"

# -- Override routing policy for CNI (CIS deviation) --

- name: "UFW: Set default allow routed (CIS 4.2.4 deviation for K8s CNI)"
  community.general.ufw:
    direction: routed
    default: allow

- name: Ensure nftables does not interfere with UFW
  ansible.builtin.systemd:
    name: nftables
    state: stopped
    enabled: false
  ignore_errors: true

# ── Phase 5: Write hardening metadata ───────────────────────────────────────

- name: Record CIS hardening metadata
  ansible.builtin.copy:
    content: |
      # CIS hardening applied at Packer build time
      benchmark: UBUNTU24-CIS
      benchmark_version: v1.0.0
      role_version: 1.0.4
      level: 1
      applied_at: {{ ansible_date_time.iso8601 }}
    dest: /etc/cis-hardening-applied
    mode: "0444"
