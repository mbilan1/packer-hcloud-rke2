---
# Default variables for rke2-base role

# RKE2 version to pre-install.
# NOTE: This default is intentionally empty. The actual version is always passed
# by Packer via --extra-vars (from rke2-base.pkr.hcl variable default or user override).
# If empty, the RKE2 install script installs the latest stable release.
kubernetes_version: ""

# Packages to pre-install (reduces cloud-init time by ~2-3 minutes)
rke2_base_packages:
  - open-iscsi          # Longhorn prerequisite
  - nfs-common          # Longhorn NFS backup support
  - curl                # RKE2 installer
  - jq                  # JSON processing for health checks
  - unattended-upgrades # Automatic security updates

# Kernel modules to load at boot
rke2_base_kernel_modules:
  - iscsi_tcp           # iSCSI for Longhorn
  - br_netfilter        # Required for Kubernetes networking
  - overlay             # Required for container runtime

# sysctl settings for Kubernetes + CIS minimum compliance
# NOTE: vm.panic_on_oom, vm.overcommit_memory, kernel.panic, kernel.panic_on_oops
#       are ALWAYS set — these are required by RKE2 CIS profile's
#       protect-kernel-defaults=true check, even without full CIS hardening.
rke2_base_sysctl:
  net.bridge.bridge-nf-call-iptables: 1
  net.bridge.bridge-nf-call-ip6tables: 1
  net.ipv4.ip_forward: 1
  fs.inotify.max_user_instances: 8192
  fs.inotify.max_user_watches: 524288
  vm.panic_on_oom: 0
  vm.overcommit_memory: 1
  kernel.panic: 10
  kernel.panic_on_oops: 1
